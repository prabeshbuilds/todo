<!DOCTYPE html>
<html>
<head>
    <title>Todo App</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #4CAF50;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f9f9f9;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
        }

        .actions a {
            margin-left: 10px;
            text-decoration: none;
            font-size: 18px;
        }

        .complete {
            color: green;
        }

        .delete {
            color: red;
        }

        /* 📱 Mobile Responsive */
        @media (max-width: 600px) {
            .container {
                margin: 20px;
                padding: 15px;
            }

            form {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            li {
                flex-direction: column;
                align-items: flex-start;
            }

            .actions {
                margin-top: 8px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Todo List</h1>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="title" placeholder="Enter task">
        <button type="submit">Add</button>
    </form>

    <ul>
        {% for todo in todos %}
            <li>
                <div>
                    {% if todo.completed %}
                        <strike>{{ todo.title }}</strike>
                    {% else %}
                        {{ todo.title }}
                    {% endif %}
                </div>

                <div class="actions">
                    <a href="{% url 'complete' todo.id %}" class="complete">✔</a>
                    <a href="{% url 'delete' todo.id %}" class="delete">❌</a>
                </div>
            </li>
        {% endfor %}
    </ul>
</div>

</body>
</html>
