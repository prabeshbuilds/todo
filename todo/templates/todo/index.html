<!DOCTYPE html>
<html>
<head>
    <title>Todo App</title>
</head>
<body>

<h1>Todo List</h1>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="title" placeholder="Enter task">
    <button type="submit">Add</button>
</form>

<ul>
    {% for todo in todos %}
        <li>
            {% if todo.completed %}
                <strike>{{ todo.title }}</strike>
            {% else %}
                {{ todo.title }}
            {% endif %}

            <a href="{% url 'complete' todo.id %}">✔</a>
            <a href="{% url 'delete' todo.id %}">❌</a>
        </li>
    {% endfor %}
</ul>

</body>
</html>
